name: CI

on:
  push:
    branches: [main]
    paths:
      - 'qd/**'
      - '.github/**'
  pull_request:
    branches: [main]
    paths:
      - 'qd/**'
      - '.github/**'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install ruff
      - run: ruff check qd/
      - run: ruff format --check qd/

  typecheck:
    needs: lint
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install mypy numpy
      - run: mypy qd/ --ignore-missing-imports

  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install numpy pytest
      - run: PYTHONPATH=. pytest qd/tests/ -v

  ai-review:
    if: github.event_name == 'pull_request'
    needs: test
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      matrix:
        focus: [security, performance, correctness]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install anthropic
      - name: Get PR diff
        run: git diff origin/${{ github.base_ref }}...HEAD > /tmp/pr_diff.txt
      - name: AI Review (${{ matrix.focus }})
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          FOCUS: ${{ matrix.focus }}
        run: python .github/scripts/ai_review.py /tmp/pr_diff.txt
