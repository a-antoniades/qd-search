# @package _global_
# EVO + RLM selector full experiment config
# For running heuristic-free crossover selection on 5 prototyping tasks
defaults:
  - override /interpreter: python
  - override /solver: mlebench/evo
  - override /solver/client@solver.operators.analyze.llm.client: gdm
  - override /solver/client@solver.operators.debug.llm.client: gdm
  - override /solver/client@solver.operators.draft.llm.client: gdm
  - override /solver/client@solver.operators.improve.llm.client: gdm
  - override /solver/client@solver.operators.crossover.llm.client: gdm
  - override /selector@solver.selector: rlm

solver:
  num_generations: 6
  individuals_per_generation: 5
  num_islands: 1
  crossover_prob: 0.5
  num_generations_till_crossover: 2
  execution_timeout: 1800
  use_test_score: true
  selector:
    verbose: true

metadata:
  git_issue_id: EVO_RLM_FULL
